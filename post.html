<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --text: #182134;
      --subtext: #4a556d;
      --line: #dbe3f3;
      --link: #1d4ed8;
      --chip-bg: #eef4ff;
      --chip-text: #1b4298;
      --code-bg: #0f172a;
      --code-text: #e6edf7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Manrope", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f9fbff 0%, #f4f7fc 100%);
      line-height: 1.85;
    }

    #content {
      width: min(94%, 58rem);
      margin: 2.4rem auto 3rem;
      padding: 1.7rem 1.6rem;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      overflow-wrap: anywhere;
      background: transparent;
    }

    #content h1,
    #content h2,
    #content h3 {
      line-height: 1.32;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    #content h1 {
      margin: 0 0 1.25rem;
      font-size: clamp(2rem, 4.7vw, 3rem);
    }

    #content h2 {
      margin: 2rem 0 0.9rem;
      font-size: clamp(1.45rem, 3vw, 1.95rem);
    }

    #content h3 {
      margin: 1.45rem 0 0.7rem;
      font-size: clamp(1.2rem, 2.4vw, 1.5rem);
    }

    #content p {
      margin: 0 0 1rem;
      color: var(--subtext);
      font-size: 1.04rem;
      line-height: 1.95;
    }

    #content ul,
    #content ol {
      margin: 0 0 1.15rem;
      padding-left: 1.5rem;
      color: var(--subtext);
    }

    #content li {
      margin: 0.42rem 0;
      padding-left: 0.25rem;
    }

    #content a {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px solid rgba(29, 78, 216, 0.25);
    }

    #content a:hover {
      border-bottom-color: rgba(29, 78, 216, 0.7);
    }

    #content code {
      font-family: "SFMono-Regular", "Menlo", "Monaco", "Consolas", monospace;
      font-size: 0.9em;
      border: 1px solid #d3def6;
      background: var(--chip-bg);
      color: var(--chip-text);
      border-radius: 0.45rem;
      padding: 0.08rem 0.42rem;
    }

    #content pre {
      margin: 1.05rem 0 1.4rem;
      padding: 0.95rem 1rem;
      border-radius: 0.65rem;
      background: var(--code-bg);
      color: var(--code-text);
      border: 1px solid #24324f;
      overflow-x: auto;
      line-height: 1.62;
    }

    #content pre code {
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      border-radius: 0;
      font-size: 0.92em;
    }

    #content blockquote {
      margin: 1rem 0;
      padding: 0.6rem 0.9rem;
      border-left: 3px solid #9db7ef;
      background: #f5f8ff;
      color: #344258;
      border-radius: 0.45rem;
    }

    @media (max-width: 48rem) {
      #content {
        width: min(95%, 58rem);
        margin: 1.3rem auto 1.9rem;
        padding: 1rem 0.95rem;
      }

      #content p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="content">Loading...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');

    fetch('posts/' + file)
      .then(res => res.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      });
  </script>
</body>
</html>
